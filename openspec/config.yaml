schema: spec-driven

context: |
  Tech stack: Rust, Dioxus (WASM frontend), Axum (HTTP server), rusqlite (SQLite)
  Domain: Manufacturing ERP — invoicing, purchasing, inventory, production, accounting
  Currency: PKR (Rs.) — all monetary values use 2 decimal places
  Database: SQLite with WAL mode, single global Mutex<Connection>
  Conventions: Model structs in models.rs, route handlers in src/server/*_routes.rs,
    UI pages in src/pages/, API client in api.rs, calculations in src/calculations/

rules:
  proposal:
    - Always reference audit finding IDs (F1-F24) when applicable
    - Include "Impact" section listing affected files
    - Mark dependencies on other changes
  tasks:
    - Break tasks into chunks of max 2 hours
    - Each task should be independently testable
    - Include verification tasks at the end
  specs:
    - Use SHALL for mandatory requirements
    - Include concrete scenarios with expected values
    - Reference specific file locations and line numbers
  design:
    - Document decisions with rationale and alternatives considered
    - Note risks and mitigation strategies
